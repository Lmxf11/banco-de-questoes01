<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Cadastrar Questão — Mesa de Estudos</title>
  <link rel="icon" type="image/jpeg" href="imagem.jpeg">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="materias.js"></script>
  <link rel="stylesheet" href="style.css">

<style>
.cadastro-layout {
  display: flex;
  min-height: calc(100vh - 56px);
}

/* Sidebar */
.cadastro-sidebar {
  width: 64px;
  padding: 16px 6px;
  background: var(--bg-dark);
  border-right: 1px solid var(--border);
  transition: width 0.25s ease;
  overflow-x: hidden;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 4px;
  flex-shrink: 0;
}

.cadastro-sidebar:hover { width: 220px; }

.cadastro-sidebar a, .cadastro-sidebar h2 {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 12px;
  white-space: nowrap;
  border-radius: var(--radius-sm);
}

.cadastro-sidebar svg { width: 22px; height: 22px; min-width: 22px; flex-shrink: 0; }
.cadastro-sidebar .text { opacity: 0; transition: opacity 0.2s ease; font-size: 13px; }
.cadastro-sidebar:hover .text { opacity: 1; transition-delay: 0.06s; }

.cadastro-sidebar h2 { color: var(--blue-pale); font-size: 13px; font-weight: 700; margin-bottom: 6px; }

.cadastro-sidebar a {
  color: var(--text-secondary);
  text-decoration: none;
  font-weight: 500;
  font-size: 13px;
}

.cadastro-sidebar a:hover { background: rgba(37,99,235,0.15); color: var(--blue-pale); text-decoration: none; }
.cadastro-sidebar a.active { background: rgba(37,99,235,0.25); color: var(--white); font-weight: 600; }

/* Main content */
.cadastro-main {
  flex: 1;
  padding: 32px 40px;
  max-width: 800px;
  overflow-y: auto;
}

.cadastro-main h1 {
  font-size: 24px;
  font-weight: 800;
  color: var(--white);
  margin-bottom: 6px;
}

.cadastro-main .subtitle {
  font-size: 14px;
  color: var(--text-secondary);
  margin-bottom: 28px;
}

/* Form card */
.form-card {
  background: linear-gradient(160deg, rgba(255,255,255,0.07), rgba(255,255,255,0.02));
  border-radius: var(--radius-xl);
  border: 1px solid var(--border);
  padding: 28px;
  backdrop-filter: blur(10px);
  box-shadow: var(--shadow-card);
  margin-bottom: 20px;
}

/* Section headers inside form */
.form-section {
  margin-bottom: 24px;
}

.form-section:last-child { margin-bottom: 0; }

.form-section-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--blue-pale);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 14px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}

/* Dropdown row */
.dropdown-row {
  display: flex;
  gap: 16px;
  margin-bottom: 14px;
}

.dropdown-row > div { flex: 1; }

.dropdown-row label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: 6px;
}

/* Alternativas grid */
.alt-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.alt-input {
  display: flex;
  align-items: center;
  gap: 8px;
}

.alt-letter {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 800;
  font-size: 14px;
  background: rgba(37,99,235,0.15);
  color: var(--blue-pale);
  flex-shrink: 0;
  border: 1px solid rgba(37,99,235,0.25);
}

.alt-input input { flex: 1; }

/* Correta select */
.correta-row {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-top: 14px;
}

.correta-row label {
  font-size: 14px;
  font-weight: 600;
  color: var(--text-primary);
}

.correta-row select {
  width: 120px;
}

/* Submit area */
.submit-area {
  display: flex;
  gap: 12px;
  margin-top: 20px;
}

/* Responsive */
@media (max-width: 900px) {
  .cadastro-layout { flex-direction: column; }
  .cadastro-sidebar { width: 100%; flex-direction: row; overflow-x: auto; padding: 8px; }
  .cadastro-sidebar:hover { width: 100%; }
  .cadastro-sidebar .text { opacity: 1; }
  .cadastro-sidebar h2 { display: none; }
  .cadastro-main { padding: 20px 16px; }
  .dropdown-row { flex-direction: column; }
  .alt-grid { grid-template-columns: 1fr; }
}
</style>
<script src="https://sites.super.myninja.ai/_assets/ninja-daytona-script.js"></script>
</head>

<body>

<!-- TOP BAR -->
<div class="top-bar">
  <div class="top-bar-left">
    <img src="imagem.jpeg" class="logo-circle" alt="Logo">
    <span>Mesa de Estudos</span>
  </div>
  <div class="top-bar-right">
    <a href="dashboard.html" class="btn-bar">Desempenho</a>
    <a href="filtrar.html" class="btn-bar">Questões</a>
    <a href="excluir.html" class="btn-bar" id="btnExcluir">Excluir</a>
    <button class="btn-bar" onclick="logout()">Sair</button>
  </div>
</div>

<div class="cadastro-layout">

  <!-- SIDEBAR -->
  <div class="cadastro-sidebar">
    <h2>
      <svg viewBox="0 0 24 24"><path fill="currentColor" d="M12 3L1 9l11 6 9-4.91V17h2V9"/></svg>
      <span class="text">Admin</span>
    </h2>
    <a href="cadastrar.html" class="active">
      <svg viewBox="0 0 24 24"><path fill="currentColor" d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
      <span class="text">Cadastrar</span>
    </a>
    <a href="excluir.html">
      <svg viewBox="0 0 24 24"><path fill="currentColor" d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
      <span class="text">Excluir</span>
    </a>
    <a href="dashboard.html">
      <svg viewBox="0 0 24 24"><path fill="currentColor" d="M3.5 18.49l6-6.01 4 4L22 6.92l-1.41-1.41-7.09 7.09-4-4L2 17.49z"/></svg>
      <span class="text">Desempenho</span>
    </a>
  </div>

  <!-- MAIN -->
  <div class="cadastro-main">
    <h1>Cadastrar Questão</h1>
    <p class="subtitle">Preencha os campos abaixo para adicionar uma nova questão ao banco.</p>

    <form id="form">
      <div class="form-card">
        <!-- Classificação -->
        <div class="form-section">
          <div class="form-section-title">Classificação</div>
          <div class="dropdown-row">
            <div>
              <label>Matéria</label>
              <select id="materia" required>
                <option value="">Escolha a matéria</option>
                <option value="Matemática">Matemática</option>
                <option value="Português">Português</option>
                <option value="Inglês">Inglês</option>
                <option value="Física">Física</option>
                <option value="Química">Química</option>
                <option value="Biologia">Biologia</option>
              </select>
            </div>
            <div>
              <label>Área</label>
              <select id="area" required disabled>
                <option value="">Escolha a área</option>
              </select>
            </div>
          </div>
          <div>
            <label style="display:block;font-size:12px;font-weight:600;color:var(--text-secondary);margin-bottom:6px">Assunto</label>
            <select id="assunto" required disabled>
              <option value="">Escolha o assunto</option>
            </select>
          </div>
        </div>

        <!-- Enunciado -->
        <div class="form-section">
          <div class="form-section-title">Enunciado</div>
          <textarea id="enunciado" placeholder="Digite o enunciado da questão..." required style="min-height:120px"></textarea>
        </div>

        <!-- Alternativas A-E -->
        <div class="form-section">
          <div class="form-section-title">Alternativas</div>
          <div class="alt-grid">
            <div class="alt-input">
              <div class="alt-letter">A</div>
              <input type="text" id="a" placeholder="Alternativa A" required>
            </div>
            <div class="alt-input">
              <div class="alt-letter">B</div>
              <input type="text" id="b" placeholder="Alternativa B" required>
            </div>
            <div class="alt-input">
              <div class="alt-letter">C</div>
              <input type="text" id="c" placeholder="Alternativa C" required>
            </div>
            <div class="alt-input">
              <div class="alt-letter">D</div>
              <input type="text" id="d" placeholder="Alternativa D" required>
            </div>
            <div class="alt-input">
              <div class="alt-letter">E</div>
              <input type="text" id="e" placeholder="Alternativa E">
            </div>
          </div>
          <div class="correta-row">
            <label>Alternativa correta:</label>
            <select id="correta" required>
              <option value="">Selecione</option>
              <option value="A">A</option>
              <option value="B">B</option>
              <option value="C">C</option>
              <option value="D">D</option>
              <option value="E">E</option>
            </select>
          </div>
        </div>
      </div>

      <div class="submit-area">
        <button type="submit" class="btn btn-primary" style="flex:1">Salvar questão</button>
        <button type="button" class="btn btn-secondary" onclick="window.history.back()">Cancelar</button>
      </div>

      <p class="msg" id="msg"></p>
    </form>
  </div>
</div>

<img src="imagem.jpeg" class="floating-logo" alt="Logo">

<script>
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

const materia = document.getElementById('materia')
const area = document.getElementById('area')
const assunto = document.getElementById('assunto')
const enunciado = document.getElementById('enunciado')
const a = document.getElementById('a')
const b = document.getElementById('b')
const c = document.getElementById('c')
const d = document.getElementById('d')
const e = document.getElementById('e')
const correta = document.getElementById('correta')
const msg = document.getElementById('msg')

function resetSelect(sel, text) {
  sel.innerHTML = `<option value="">${text}</option>`
  sel.disabled = true
}

materia.addEventListener('change', () => {
  resetSelect(area, 'Escolha a área')
  resetSelect(assunto, 'Escolha o assunto')
  if (!materia.value) return
  area.disabled = false
  MATERIAS_MAP[materia.value].areas.forEach(areaName => {
    const opt = document.createElement('option')
    opt.value = areaName
    opt.textContent = areaName
    area.appendChild(opt)
  })
})

area.addEventListener('change', () => {
  resetSelect(assunto, 'Escolha o assunto')
  if (!area.value) return
  assunto.disabled = false
  MATERIAS_MAP[materia.value].assuntos[area.value].forEach(assuntoName => {
    const opt = document.createElement('option')
    opt.value = assuntoName
    opt.textContent = assuntoName
    assunto.appendChild(opt)
  })
})

document.getElementById('form').addEventListener('submit', async (ev) => {
  ev.preventDefault()
  msg.style.color = 'var(--error)'
  msg.textContent = ''

  const { error } = await supabaseClient
    .from('questoes')
    .insert({
      materia: materia.value,
      area: area.value,
      assunto: assunto.value,
      enunciado: enunciado.value,
      alternativa_a: a.value,
      alternativa_b: b.value,
      alternativa_c: c.value,
      alternativa_d: d.value,
      alternativa_e: e.value || null,
      correta: correta.value.toUpperCase()
    })

  if (error) {
    msg.textContent = 'Erro ao salvar questão.'
    console.error(error)
    return
  }

  msg.style.color = 'var(--success)'
  msg.textContent = 'Questão cadastrada com sucesso!'
  document.getElementById('form').reset()
  resetSelect(area, 'Escolha a área')
  resetSelect(assunto, 'Escolha o assunto')
})

// Admin guard
(async () => {
  const { data: { user } } = await supabaseClient.auth.getUser()
  if (!user) { window.location.href = 'login.html'; return }

  const { data: perfil, error } = await supabaseClient
    .from('users')
    .select('role')
    .eq('id', user.id)
    .single()

  if (error || !perfil || perfil.role !== 'admin') {
    alert('Acesso restrito a administradores')
    window.location.href = 'dashboard.html'
  }
})()

function logout() {
  supabaseClient.auth.signOut().then(() => { window.location.href = 'login.html' })
}
</script>
</body>
</html>
