<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Excluir Questões — Mesa de Estudos</title>
  <link rel="icon" type="image/jpeg" href="imagem.jpeg">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="materias.js"></script>
  <link rel="stylesheet" href="style.css">

<style>
.excluir-layout {
  display: flex;
  min-height: calc(100vh - 56px);
}

/* Reuse sidebar style from cadastrar */
.excluir-sidebar {
  width: 64px;
  padding: 16px 6px;
  background: var(--bg-dark);
  border-right: 1px solid var(--border);
  transition: width 0.25s ease;
  overflow-x: hidden;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 4px;
  flex-shrink: 0;
}

.excluir-sidebar:hover { width: 220px; }

.excluir-sidebar a, .excluir-sidebar h2 {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 12px;
  white-space: nowrap;
  border-radius: var(--radius-sm);
}

.excluir-sidebar svg { width: 22px; height: 22px; min-width: 22px; flex-shrink: 0; }
.excluir-sidebar .text { opacity: 0; transition: opacity 0.2s ease; font-size: 13px; }
.excluir-sidebar:hover .text { opacity: 1; transition-delay: 0.06s; }

.excluir-sidebar h2 { color: var(--blue-pale); font-size: 13px; font-weight: 700; margin-bottom: 6px; }

.excluir-sidebar a {
  color: var(--text-secondary);
  text-decoration: none;
  font-weight: 500;
  font-size: 13px;
}

.excluir-sidebar a:hover { background: rgba(37,99,235,0.15); color: var(--blue-pale); text-decoration: none; }
.excluir-sidebar a.active { background: rgba(37,99,235,0.25); color: var(--white); font-weight: 600; }

/* Main */
.excluir-main {
  flex: 1;
  padding: 32px 40px;
  max-width: 900px;
  overflow-y: auto;
}

.excluir-main h1 {
  font-size: 24px;
  font-weight: 800;
  color: var(--white);
  margin-bottom: 6px;
}

.excluir-main .subtitle {
  font-size: 14px;
  color: var(--text-secondary);
  margin-bottom: 28px;
}

/* Filter bar */
.filter-bar {
  background: linear-gradient(160deg, rgba(255,255,255,0.07), rgba(255,255,255,0.02));
  border-radius: var(--radius-xl);
  border: 1px solid var(--border);
  padding: 20px 24px;
  backdrop-filter: blur(10px);
  box-shadow: var(--shadow-card);
  margin-bottom: 24px;
  display: flex;
  gap: 16px;
  align-items: flex-end;
  flex-wrap: wrap;
}

.filter-bar .filter-group { flex: 1; min-width: 160px; }

.filter-bar label {
  display: block;
  font-size: 11px;
  font-weight: 700;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 6px;
}

.filter-bar .btn-row {
  display: flex;
  gap: 8px;
}

/* Question list */
.question-list {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.question-item {
  background: linear-gradient(160deg, rgba(255,255,255,0.07), rgba(255,255,255,0.02));
  border-radius: var(--radius-lg);
  border: 1px solid var(--border);
  padding: 20px 24px;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 16px;
  transition: all 0.2s;
}

.question-item:hover {
  border-color: rgba(248,113,113,0.3);
  background: linear-gradient(160deg, rgba(255,255,255,0.10), rgba(255,255,255,0.04));
}

.question-info { flex: 1; }

.question-info .q-meta {
  display: flex;
  gap: 8px;
  margin-bottom: 10px;
  flex-wrap: wrap;
}

.q-badge {
  padding: 3px 8px;
  border-radius: 4px;
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  background: rgba(37,99,235,0.15);
  color: var(--blue-pale);
}

.question-info .q-text {
  font-size: 14px;
  color: var(--text-primary);
  line-height: 1.6;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.btn-delete {
  padding: 10px 16px;
  border-radius: var(--radius-sm);
  border: none;
  background: linear-gradient(135deg, #dc2626, #ef4444);
  color: #fff;
  font-weight: 700;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.15s;
  flex-shrink: 0;
  white-space: nowrap;
}

.btn-delete:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(220,38,38,0.4); }

/* Empty / loading */
.empty-state {
  text-align: center;
  padding: 48px 20px;
}

.empty-state svg { width: 64px; height: 64px; color: var(--text-muted); margin-bottom: 16px; }
.empty-state h3 { font-size: 18px; font-weight: 700; color: var(--text-primary); margin-bottom: 8px; }
.empty-state p { font-size: 14px; color: var(--text-secondary); }

/* Count badge */
.result-badge {
  font-size: 13px;
  color: var(--text-secondary);
  margin-bottom: 16px;
}

.result-badge strong { color: var(--blue-pale); }

/* Responsive */
@media (max-width: 900px) {
  .excluir-layout { flex-direction: column; }
  .excluir-sidebar { width: 100%; flex-direction: row; overflow-x: auto; padding: 8px; }
  .excluir-sidebar:hover { width: 100%; }
  .excluir-sidebar .text { opacity: 1; }
  .excluir-sidebar h2 { display: none; }
  .excluir-main { padding: 20px 16px; }
  .filter-bar { flex-direction: column; }
  .question-item { flex-direction: column; }
}
</style>
<script src="https://sites.super.myninja.ai/_assets/ninja-daytona-script.js"></script>
</head>

<body>

<!-- TOP BAR -->
<div class="top-bar">
  <div class="top-bar-left">
    <img src="imagem.jpeg" class="logo-circle" alt="Logo">
    <span>Mesa de Estudos</span>
  </div>
  <div class="top-bar-right">
    <a href="cadastrar.html" class="btn-bar">Cadastrar</a>
    <a href="dashboard.html" class="btn-bar">Desempenho</a>
    <button class="btn-bar" onclick="logout()">Sair</button>
  </div>
</div>

<div class="excluir-layout">

  <!-- SIDEBAR -->
  <div class="excluir-sidebar">
    <h2>
      <svg viewBox="0 0 24 24"><path fill="currentColor" d="M12 3L1 9l11 6 9-4.91V17h2V9"/></svg>
      <span class="text">Admin</span>
    </h2>
    <a href="cadastrar.html">
      <svg viewBox="0 0 24 24"><path fill="currentColor" d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
      <span class="text">Cadastrar</span>
    </a>
    <a href="excluir.html" class="active">
      <svg viewBox="0 0 24 24"><path fill="currentColor" d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
      <span class="text">Excluir</span>
    </a>
    <a href="dashboard.html">
      <svg viewBox="0 0 24 24"><path fill="currentColor" d="M3.5 18.49l6-6.01 4 4L22 6.92l-1.41-1.41-7.09 7.09-4-4L2 17.49z"/></svg>
      <span class="text">Desempenho</span>
    </a>
  </div>

  <!-- MAIN -->
  <div class="excluir-main">
    <h1>Excluir Questões</h1>
    <p class="subtitle">Selecione os filtros e encontre questões para remover do banco.</p>

    <!-- Filter bar -->
    <div class="filter-bar">
      <div class="filter-group">
        <label>Matéria</label>
        <select id="materia">
          <option value="">Todas as matérias</option>
          <option value="Matemática">Matemática</option>
          <option value="Português">Português</option>
          <option value="Inglês">Inglês</option>
          <option value="Física">Física</option>
          <option value="Química">Química</option>
          <option value="Biologia">Biologia</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Área</label>
        <select id="area" disabled>
          <option value="">Todas as áreas</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Assunto</label>
        <select id="assunto" disabled>
          <option value="">Todos os assuntos</option>
        </select>
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" id="btnBuscar">Buscar</button>
        <button class="btn btn-secondary" onclick="window.history.back()">Voltar</button>
      </div>
    </div>

    <div class="result-badge" id="resultBadge" style="display:none"></div>
    <div class="question-list" id="lista"></div>
  </div>
</div>

<img src="imagem.jpeg" class="floating-logo" alt="Logo">

<script>
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

const materia = document.getElementById('materia')
const area = document.getElementById('area')
const assunto = document.getElementById('assunto')
const lista = document.getElementById('lista')
const resultBadge = document.getElementById('resultBadge')

function resetSelect(sel, text) {
  sel.innerHTML = `<option value="">${text}</option>`
  sel.disabled = true
}

materia.addEventListener('change', () => {
  resetSelect(area, 'Todas as áreas')
  resetSelect(assunto, 'Todos os assuntos')
  if (!materia.value) return
  area.disabled = false
  MATERIAS_MAP[materia.value].areas.forEach(areaName => {
    const opt = document.createElement('option')
    opt.value = areaName; opt.textContent = areaName
    area.appendChild(opt)
  })
})

area.addEventListener('change', () => {
  resetSelect(assunto, 'Todos os assuntos')
  if (!area.value || !materia.value) return
  assunto.disabled = false
  const assuntos = MATERIAS_MAP[materia.value]?.assuntos?.[area.value]
  if (assuntos) {
    assuntos.forEach(assuntoName => {
      const opt = document.createElement('option')
      opt.value = assuntoName; opt.textContent = assuntoName
      assunto.appendChild(opt)
    })
  }
})

document.getElementById('btnBuscar').addEventListener('click', async () => {
  lista.innerHTML = ''
  resultBadge.style.display = 'none'

  let query = supabaseClient.from('questoes').select('id, enunciado, materia, area, assunto')
  if (materia.value) query = query.eq('materia', materia.value)
  if (area.value) query = query.eq('area', area.value)
  if (assunto.value) query = query.eq('assunto', assunto.value)

  const { data, error } = await query

  if (error) {
    lista.innerHTML = '<div class="empty-state"><h3>Erro ao buscar questões</h3></div>'
    return
  }

  if (!data || data.length === 0) {
    lista.innerHTML = `
      <div class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
        <h3>Nenhuma questão encontrada</h3>
        <p>Altere os filtros e tente novamente</p>
      </div>`
    return
  }

  resultBadge.style.display = 'block'
  resultBadge.innerHTML = `Encontradas <strong>${data.length}</strong> questões`

  data.forEach(q => {
    const item = document.createElement('div')
    item.className = 'question-item'
    item.id = `q_${q.id}`
    item.innerHTML = `
      <div class="question-info">
        <div class="q-meta">
          <span class="q-badge">${q.materia}</span>
          <span class="q-badge">${q.area}</span>
          <span class="q-badge">${q.assunto}</span>
        </div>
        <div class="q-text">${q.enunciado}</div>
      </div>
      <button class="btn-delete" onclick="excluirQuestao('${q.id}')">Excluir</button>
    `
    lista.appendChild(item)
  })
})

async function excluirQuestao(id) {
  if (!confirm('Tem certeza que deseja excluir essa questão? Essa ação não pode ser desfeita.')) return

  const { error } = await supabaseClient.from('questoes').delete().eq('id', id)
  if (error) {
    alert('Erro ao excluir questão')
  } else {
    const el = document.getElementById(`q_${id}`)
    if (el) { el.style.opacity = '0'; el.style.transform = 'translateX(20px)'; setTimeout(() => el.remove(), 300) }
    // Update count
    const badge = resultBadge.querySelector('strong')
    if (badge) { const count = parseInt(badge.textContent) - 1; badge.textContent = count }
  }
}

// Admin guard
(async () => {
  const { data: { user } } = await supabaseClient.auth.getUser()
  if (!user) { window.location.href = 'login.html'; return }

  const { data: perfil, error } = await supabaseClient
    .from('users')
    .select('role')
    .eq('id', user.id)
    .single()

  if (error || !perfil || perfil.role !== 'admin') {
    alert('Acesso restrito a administradores')
    window.location.href = 'dashboard.html'
  }
})()

function logout() {
  supabaseClient.auth.signOut().then(() => { window.location.href = 'login.html' })
}
</script>
</body>
</html>
