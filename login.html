<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Entrar — Mesa de Estudos</title>
  <link rel="icon" type="image/png" href="imagem.jpeg">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="materias.js"></script>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }

body {
  min-height: 100vh;
  display: flex;
  background: linear-gradient(135deg, #0a1628 0%, #0f1f3d 40%, #1a3a6b 100%);
  overflow: hidden;
}

/* ===== LEFT PANEL (ILLUSTRATION) ===== */
.left-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 60px;
  position: relative;
  overflow: hidden;
}

.left-panel::before {
  content: '';
  position: absolute;
  width: 500px;
  height: 500px;
  background: radial-gradient(circle, rgba(37,99,235,0.15) 0%, transparent 70%);
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  pointer-events: none;
}

.brand {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 40px;
}

.brand img {
  width: 52px;
  height: 52px;
  border-radius: 14px;
  background: #fff;
  padding: 4px;
}

.brand-name {
  font-size: 26px;
  font-weight: 800;
  color: #fff;
  letter-spacing: -0.5px;
}

.hero-text {
  text-align: center;
  max-width: 420px;
}

.hero-text h1 {
  font-size: 36px;
  font-weight: 800;
  color: #fff;
  margin-bottom: 16px;
  line-height: 1.2;
}

.hero-text h1 span { color: #60a5fa; }

.hero-text p {
  font-size: 16px;
  color: #94a3b8;
  line-height: 1.6;
}

/* Floating shapes */
.shapes {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none;
}

.shape {
  position: absolute;
  border-radius: 50%;
  background: rgba(37,99,235,0.08);
}

.shape-1 { width: 300px; height: 300px; top: -80px; left: -60px; }
.shape-2 { width: 200px; height: 200px; bottom: 60px; right: -40px; background: rgba(96,165,250,0.06); }
.shape-3 { width: 120px; height: 120px; top: 40%; right: 20%; background: rgba(59,130,246,0.05); }

/* ===== RIGHT PANEL (FORM) ===== */
.right-panel {
  width: 480px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px;
  background: #fff;
  border-radius: 32px 0 0 32px;
  box-shadow: -20px 0 60px rgba(0,0,0,0.3);
}

.form-container {
  width: 100%;
  max-width: 360px;
}

.form-container h2 {
  font-size: 24px;
  font-weight: 800;
  color: #0a1628;
  margin-bottom: 6px;
}

.form-container .subtitle {
  font-size: 14px;
  color: #64748b;
  margin-bottom: 28px;
}

/* ===== INPUT GROUP ===== */
.input-group {
  margin-bottom: 18px;
}

.input-group label {
  display: block;
  font-size: 13px;
  font-weight: 600;
  color: #334155;
  margin-bottom: 6px;
}

.input-group label span { color: #2563eb; }

.input-wrapper {
  position: relative;
}

.input-wrapper input {
  width: 100%;
  padding: 12px 16px;
  border-radius: 10px;
  border: 1.5px solid #e2e8f0;
  background: #f8fafc;
  color: #0f172a;
  font-size: 14px;
  outline: none;
  transition: all 0.2s;
}

.input-wrapper input:focus {
  border-color: #2563eb;
  box-shadow: 0 0 0 3px rgba(37,99,235,0.15);
  background: #fff;
}

.input-wrapper input::placeholder { color: #94a3b8; }

/* Password extras */
.pwd-row {
  display: flex;
  justify-content: flex-end;
  margin-top: 6px;
}

.pwd-row a {
  font-size: 12px;
  color: #2563eb;
  font-weight: 600;
}

/* ===== BUTTONS ===== */
.btn-continue {
  width: 100%;
  padding: 13px;
  border-radius: 12px;
  border: none;
  background: linear-gradient(135deg, #2563eb, #1d4ed8);
  color: #fff;
  font-weight: 700;
  font-size: 15px;
  cursor: pointer;
  transition: all 0.2s;
  margin-top: 6px;
}

.btn-continue:hover {
  transform: translateY(-2px);
  box-shadow: 0 12px 28px rgba(37,99,235,0.4);
}

.btn-continue:active { transform: translateY(0); }

.divider {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 20px 0;
}

.divider::before,
.divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: #e2e8f0;
}

.divider span {
  font-size: 13px;
  color: #94a3b8;
  font-weight: 500;
}

.btn-chave {
  width: 100%;
  padding: 12px;
  border-radius: 12px;
  border: 1.5px solid #2563eb;
  background: #fff;
  color: #2563eb;
  font-weight: 600;
  font-size: 14px;
  cursor: pointer;
  transition: all 0.2s;
  margin-bottom: 14px;
}

.btn-chave:hover { background: #eff6ff; }

.btn-google {
  width: 100%;
  padding: 12px;
  border-radius: 12px;
  border: 1.5px solid #e2e8f0;
  background: #fff;
  color: #334155;
  font-weight: 600;
  font-size: 14px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  transition: all 0.2s;
}

.btn-google:hover { background: #f8fafc; border-color: #cbd5e1; }

.btn-google svg { width: 20px; height: 20px; }

.bottom-text {
  text-align: center;
  font-size: 13px;
  color: #64748b;
  margin-top: 24px;
}

.bottom-text a {
  color: #2563eb;
  font-weight: 700;
  text-decoration: none;
}

.bottom-text a:hover { text-decoration: underline; }

#msg {
  margin-top: 12px;
  font-weight: 600;
  font-size: 13px;
  text-align: center;
}

/* ===== RESPONSIVE ===== */
@media (max-width: 900px) {
  body { flex-direction: column; overflow: auto; }
  .left-panel { padding: 40px 20px; }
  .hero-text h1 { font-size: 26px; }
  .right-panel {
    width: 100%;
    border-radius: 24px 24px 0 0;
    padding: 32px 24px;
  }
  .shape-1, .shape-2, .shape-3 { display: none; }
}
</style>
<script src="https://sites.super.myninja.ai/_assets/ninja-daytona-script.js"></script>
</head>

<body>

<!-- LEFT: Illustration + Branding -->
<div class="left-panel">
  <div class="shapes">
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>
  </div>

  <div class="brand">
    <img src="imagem.jpeg" alt="Logo">
    <span class="brand-name">Mesa de Estudos</span>
  </div>

  <div class="hero-text">
    <h1>Estude com <span>estratégia</span> Aprovado com direcionamento</h1>
    <p>Resolva questões, acompanhe seu desempenho e direcione seus estudos para o que realmente cai na prova.</p>
  </div>
</div>

<!-- RIGHT: Login Form -->
<div class="right-panel">
  <div class="form-container">
    <h2>Entrar</h2>
    <p class="subtitle">Acesse sua conta para continuar</p>

    <form id="login-form">
      <div class="input-group">
        <label>Email <span>*</span></label>
        <div class="input-wrapper">
          <input type="email" id="email" placeholder="seu@email.com" required>
        </div>
      </div>

      <div class="input-group">
        <label>Senha <span>*</span></label>
        <div class="input-wrapper">
          <input type="password" id="password" placeholder="Sua senha" required>
        </div>
        <div class="pwd-row">
          <a href="#">Esqueci minha senha</a>
        </div>
      </div>

      <button type="submit" class="btn-continue">Continuar</button>
    </form>

    <p id="msg"></p>

    <div class="divider"><span>ou</span></div>

    <button class="btn-chave">🔑 Login via chave de acesso</button>

    <button class="btn-google">
      <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.27-4.74 3.27-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Entrar com Google
    </button>

    <p class="bottom-text">
      Ainda não é aluno? <a href="index.html">Cadastre-se</a>
    </p>
  </div>
</div>

<script>
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

const form = document.getElementById('login-form')
const msg = document.getElementById('msg')

form.addEventListener('submit', async (e) => {
  e.preventDefault()
  msg.style.color = '#facc15'
  msg.innerText = 'Entrando...'

  const email = document.getElementById('email').value
  const password = document.getElementById('password').value

  const { error } = await supabaseClient.auth.signInWithPassword({ email, password })

  if (error) {
    msg.style.color = '#f87171'
    msg.innerText = 'Email ou senha inválidos'
    return
  }

  msg.style.color = '#34d399'
  msg.innerText = 'Login feito! Redirecionando...'
  setTimeout(() => { window.location.href = 'dashboard.html' }, 1000)
})
</script>

</body>
</html>
