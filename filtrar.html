<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Banco de Questões — Mesa de Estudos</title>
  <link rel="icon" type="image/jpeg" href="imagem.jpeg">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="materias.js"></script>
  <link rel="stylesheet" href="style.css">

<style>
/* ===== FILTER LAYOUT ===== */
.filter-layout {
  display: flex;
  min-height: calc(100vh - 56px);
}

/* ===== LEFT: Filter Panel ===== */
.filter-panel {
  width: 340px;
  background: var(--bg-mid);
  border-right: 1px solid var(--border);
  padding: 24px 20px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  flex-shrink: 0;
  overflow-y: auto;
}

.filter-panel-title {
  font-size: 18px;
  font-weight: 800;
  color: var(--white);
  margin-bottom: 4px;
}

.filter-panel-desc {
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 1.5;
  margin-bottom: 8px;
}

/* Search box */
.filter-search {
  display: flex;
  align-items: center;
  background: rgba(255,255,255,0.06);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 10px 14px;
  gap: 10px;
  margin-bottom: 4px;
}

.filter-search svg { width: 16px; height: 16px; color: var(--text-muted); flex-shrink: 0; }

.filter-search input {
  border: none;
  background: none;
  outline: none;
  font-size: 13px;
  color: var(--text-primary);
  width: 100%;
  font-family: 'Inter', sans-serif;
}

.filter-search input::placeholder { color: var(--text-muted); }

/* Subject list with checkboxes */
.subject-section-title {
  font-size: 11px;
  font-weight: 700;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 8px;
}

.subject-list {
  display: flex;
  flex-direction: column;
  gap: 3px;
  max-height: 220px;
  overflow-y: auto;
}

.subject-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 12px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: background 0.15s;
}

.subject-item:hover { background: rgba(37,99,235,0.1); }
.subject-item.selected { background: rgba(37,99,235,0.2); }

.subject-item input[type="checkbox"] {
  width: 16px;
  height: 16px;
  accent-color: var(--blue-primary);
  cursor: pointer;
  flex-shrink: 0;
}

.subject-item label {
  font-size: 13px;
  color: var(--text-secondary);
  cursor: pointer;
  font-weight: 500;
  transition: color 0.15s;
}

.subject-item.selected label { color: var(--blue-pale); font-weight: 600; }

/* Dropdowns in filter panel */
.filter-dropdown-group {
  margin-bottom: 12px;
}

.filter-dropdown-group label {
  display: block;
  font-size: 11px;
  font-weight: 700;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 6px;
}

/* Filter tags */
.filter-tags-section {
  margin-top: 4px;
}

.filter-tags-section h4 {
  font-size: 11px;
  font-weight: 700;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 8px;
}

.filter-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.filter-tag {
  padding: 5px 12px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  border: 1px solid var(--border);
  background: rgba(255,255,255,0.05);
  color: var(--text-secondary);
  user-select: none;
}

.filter-tag:hover { background: rgba(37,99,235,0.1); color: var(--blue-pale); }
.filter-tag.active { background: var(--blue-primary); color: #fff; border-color: var(--blue-primary); }

/* Action buttons at bottom of filter panel */
.filter-actions {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-top: auto;
  padding-top: 16px;
  border-top: 1px solid var(--border);
}

/* ===== RIGHT: Results Panel ===== */
.results-panel {
  flex: 1;
  padding: 28px 36px;
  overflow-y: auto;
}

.results-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 24px;
  flex-wrap: wrap;
  gap: 12px;
}

.results-count {
  font-size: 28px;
  font-weight: 800;
  color: var(--white);
}

.results-count .sub {
  font-size: 14px;
  font-weight: 500;
  color: var(--text-secondary);
}

/* Applied filter pills */
.applied-filters {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 20px;
}

.applied-pill {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 5px 12px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
  background: rgba(37,99,235,0.15);
  color: var(--blue-pale);
  border: 1px solid rgba(37,99,235,0.25);
  cursor: pointer;
  transition: all 0.15s;
}

.applied-pill:hover { background: rgba(37,99,235,0.25); }
.applied-pill svg { width: 12px; height: 12px; }

/* Results list */
.results-list {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.result-card {
  background: linear-gradient(160deg, rgba(255,255,255,0.07), rgba(255,255,255,0.02));
  border-radius: var(--radius-lg);
  border: 1px solid var(--border);
  padding: 20px 24px;
  transition: all 0.2s;
  cursor: pointer;
}

.result-card:hover {
  border-color: rgba(37,99,235,0.3);
  background: linear-gradient(160deg, rgba(255,255,255,0.10), rgba(255,255,255,0.04));
}

.result-card-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 10px;
}

.result-card-num {
  font-size: 12px;
  font-weight: 700;
  color: var(--blue-primary);
  background: rgba(37,99,235,0.15);
  padding: 2px 8px;
  border-radius: 4px;
}

.result-card-meta {
  font-size: 12px;
  color: var(--text-secondary);
}

.result-card-text {
  font-size: 14px;
  color: var(--text-primary);
  line-height: 1.6;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.result-card-footer {
  display: flex;
  gap: 8px;
  margin-top: 12px;
  flex-wrap: wrap;
}

.result-tag {
  padding: 3px 8px;
  border-radius: 4px;
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  background: rgba(255,255,255,0.06);
  color: var(--text-muted);
  border: 1px solid var(--border);
}

/* Empty results */
.no-results {
  text-align: center;
  padding: 60px 20px;
}

.no-results svg { width: 64px; height: 64px; color: var(--text-muted); margin-bottom: 16px; }
.no-results h3 { font-size: 18px; font-weight: 700; color: var(--text-primary); margin-bottom: 8px; }
.no-results p { font-size: 14px; color: var(--text-secondary); }

/* Pagination */
.pagination {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin-top: 24px;
}

.page-btn {
  padding: 8px 14px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: rgba(255,255,255,0.05);
  color: var(--text-secondary);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
}

.page-btn:hover { background: rgba(37,99,235,0.15); color: var(--blue-pale); }
.page-btn.active { background: var(--blue-primary); color: #fff; border-color: var(--blue-primary); }

/* ===== RESPONSIVE ===== */
@media (max-width: 900px) {
  .filter-layout { flex-direction: column; }
  .filter-panel { width: 100%; border-right: none; border-bottom: 1px solid var(--border); max-height: 400px; }
  .results-panel { padding: 20px 16px; }
}

@media (max-width: 600px) {
  .top-bar { flex-direction: column; gap: 8px; }
  .results-header { flex-direction: column; align-items: flex-start; }
}
</style>
<script src="https://sites.super.myninja.ai/_assets/ninja-daytona-script.js"></script>
</head>

<body>

<!-- TOP BAR -->
<div class="top-bar">
  <div class="top-bar-left">
    <img src="imagem.jpeg" class="logo-circle" alt="Logo">
    <span>Mesa de Estudos</span>
  </div>
  <div class="top-bar-right">
    <a href="dashboard.html" class="btn-bar">Desempenho</a>
    <a href="materiais.html" class="btn-bar">Materiais</a>
  </div>
</div>

<div class="filter-layout">

  <!-- LEFT: Filter Panel -->
  <div class="filter-panel">
    <div>
      <div class="filter-panel-title">Filtrar Questões</div>
      <p class="filter-panel-desc">Selecione os critérios para encontrar as questões que deseja resolver.</p>
    </div>

    <div class="filter-search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
      <input type="text" id="searchMateria" placeholder="Buscar matérias...">
    </div>

    <div>
      <div class="subject-section-title">Matérias</div>
      <div class="subject-list" id="subjectList"></div>
    </div>

    <div class="filter-dropdown-group">
      <label>Área</label>
      <select id="area" disabled>
        <option value="">Selecione uma área</option>
      </select>
    </div>

    <div class="filter-dropdown-group">
      <label>Assunto</label>
      <select id="assunto" disabled>
        <option value="">Selecione um assunto</option>
      </select>
    </div>

    <div class="filter-tags-section">
      <h4>Tipo de questão</h4>
      <div class="filter-tags">
        <div class="filter-tag active" data-filter="resolucao">Com resolução</div>
        <div class="filter-tag" data-filter="multipla">Múltipla escolha</div>
        <div class="filter-tag" data-filter="jaResolvi">Já resolvi</div>
        <div class="filter-tag" data-filter="naoResolvi">Não resolvi</div>
      </div>
    </div>

    <div class="filter-actions">
      <button class="btn btn-primary" id="btnVerQuestoes" style="width:100%">Ver questões</button>
      <button class="btn btn-secondary" id="btnCriarLista" style="width:100%">Criar lista</button>
      <button class="btn btn-secondary" id="btnCriarSimulado" style="width:100%">Criar simulado</button>
    </div>
  </div>

  <!-- RIGHT: Results Panel -->
  <div class="results-panel">
    <div class="results-header">
      <div class="results-count">
        <span id="questaoCount">0</span> <span class="sub">questões encontradas</span>
      </div>
    </div>

    <div class="applied-filters" id="appliedFilters"></div>

    <div class="results-list" id="resultsList">
      <!-- Dynamically populated -->
    </div>

    <p class="msg" id="msg" style="display:none; text-align:center; padding:20px;"></p>
  </div>

</div>

<img src="imagem.jpeg" class="floating-logo" alt="Logo">

<script>
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

// Auth guard
async function checkAuth() {
  const { data: { user } } = await supabaseClient.auth.getUser()
  if (!user) {
    window.location.href = 'login.html'
    return false
  }
  return true
}

// Check admin status for sidebar — use users table (consistent with dashboard)
async function verificarAdmin() {
  const { data: { user } } = await supabaseClient.auth.getUser()
  if (!user) return
  const { data: userData } = await supabaseClient
    .from('users')
    .select('role')
    .eq('id', user.id)
    .single()
  if (userData && userData.role === 'admin') {
    document.querySelectorAll('.admin-only').forEach(el => el.classList.add('show'))
  }
}

// Elements (must be declared before use)
const areaSelect = document.getElementById('area')
const assuntoSelect = document.getElementById('assunto')
const subjectList = document.getElementById('subjectList')
const searchMateria = document.getElementById('searchMateria')
const questaoCount = document.getElementById('questaoCount')
const resultsList = document.getElementById('resultsList')
const appliedFilters = document.getElementById('appliedFilters')
const msg = document.getElementById('msg')

let selectedMateria = ''
let questoesCache = []

// Auth check — run after DOM elements are declared
checkAuth().then(isAuth => {
  if (isAuth) {
    verificarAdmin()
    renderSubjectList()
    buscarQuestoes()
  }
})

// Render subject list
function renderSubjectList(filter = '') {
  subjectList.innerHTML = ''
  const materias = Object.keys(MATERIAS_MAP)
  const filtered = filter
    ? materias.filter(m => m.toLowerCase().includes(filter.toLowerCase()))
    : materias

  filtered.forEach(m => {
    const item = document.createElement('div')
    item.className = 'subject-item' + (selectedMateria === m ? ' selected' : '')
    item.innerHTML = `
      <input type="checkbox" id="chk_${m}" ${selectedMateria === m ? 'checked' : ''}>
      <label for="chk_${m}">${m}</label>
    `
    item.addEventListener('click', (e) => {
      if (e.target.tagName === 'INPUT') return
      const chk = item.querySelector('input')
      chk.checked = !chk.checked
      handleMateriaChange(m, chk.checked)
    })
    item.querySelector('input').addEventListener('change', (e) => {
      handleMateriaChange(m, e.target.checked)
    })
    subjectList.appendChild(item)
  })
}

function handleMateriaChange(materiaName, checked) {
  if (checked) {
    // Single-select: uncheck all others, only this one stays checked
    selectedMateria = materiaName
    areaSelect.innerHTML = '<option value="">Selecione uma área</option>'
    assuntoSelect.innerHTML = '<option value="">Selecione um assunto</option>'
    assuntoSelect.disabled = true
    areaSelect.disabled = false

    if (MATERIAS_MAP[materiaName]) {
      MATERIAS_MAP[materiaName].areas.forEach(areaName => {
        areaSelect.innerHTML += `<option value="${areaName}">${areaName}</option>`
      })
    }
  } else {
    selectedMateria = ''
    areaSelect.innerHTML = '<option value="">Selecione uma área</option>'
    assuntoSelect.innerHTML = '<option value="">Selecione um assunto</option>'
    areaSelect.disabled = true
    assuntoSelect.disabled = true
  }
  renderSubjectList(searchMateria.value)
  updateAppliedFilters()
  buscarQuestoes()
}

searchMateria.addEventListener('input', () => { renderSubjectList(searchMateria.value) })

areaSelect.addEventListener('change', () => {
  assuntoSelect.innerHTML = '<option value="">Selecione um assunto</option>'
  assuntoSelect.disabled = true
  if (!selectedMateria || !areaSelect.value) { updateAppliedFilters(); buscarQuestoes(); return }

  const assuntos = MATERIAS_MAP[selectedMateria]?.assuntos?.[areaSelect.value]
  if (!assuntos || !Array.isArray(assuntos)) { updateAppliedFilters(); buscarQuestoes(); return }

  assuntoSelect.disabled = false
  assuntos.forEach(nome => { assuntoSelect.innerHTML += `<option value="${nome}">${nome}</option>` })
  updateAppliedFilters()
  buscarQuestoes()
})

assuntoSelect.addEventListener('change', () => { updateAppliedFilters(); buscarQuestoes() })

function updateAppliedFilters() {
  appliedFilters.innerHTML = ''
  if (selectedMateria) {
    appliedFilters.innerHTML += `<span class="applied-pill" onclick="clearFilter('materia')">${selectedMateria} <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M18 6L6 18M6 6l12 12"/></svg></span>`
  }
  if (areaSelect.value) {
    appliedFilters.innerHTML += `<span class="applied-pill" onclick="clearFilter('area')">${areaSelect.value} <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M18 6L6 18M6 6l12 12"/></svg></span>`
  }
  if (assuntoSelect.value) {
    appliedFilters.innerHTML += `<span class="applied-pill" onclick="clearFilter('assunto')">${assuntoSelect.value} <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M18 6L6 18M6 6l12 12"/></svg></span>`
  }
}

function clearFilter(type) {
  if (type === 'materia') {
    selectedMateria = ''
    areaSelect.innerHTML = '<option value="">Selecione uma área</option>'
    areaSelect.disabled = true
    assuntoSelect.innerHTML = '<option value="">Selecione um assunto</option>'
    assuntoSelect.disabled = true
    renderSubjectList(searchMateria.value)
  } else if (type === 'area') {
    areaSelect.value = ''
    assuntoSelect.innerHTML = '<option value="">Selecione um assunto</option>'
    assuntoSelect.disabled = true
  } else if (type === 'assunto') {
    assuntoSelect.value = ''
  }
  updateAppliedFilters()
  buscarQuestoes()
}

// Fetch questions
async function buscarQuestoes() {
  msg.style.display = 'none'
  
  try {
    let query = supabaseClient.from('questoes').select('*')

    if (selectedMateria) query = query.eq('materia', selectedMateria)
    if (areaSelect.value) query = query.eq('area', areaSelect.value)
    if (assuntoSelect.value) query = query.eq('assunto', assuntoSelect.value)

    const { data, error } = await query

    if (error) {
      questaoCount.textContent = '0'
      resultsList.innerHTML = ''
      msg.style.display = 'block'
      msg.className = 'msg msg-error'
      msg.textContent = 'Erro ao buscar questões: ' + (error.message || '')
      return
    }

    let filteredData = data || []

    // Apply resolution status filter (jaResolvi / naoResolvi)
    if (activeResolucaoFilter === 'jaResolvi' || activeResolucaoFilter === 'naoResolvi') {
      const { data: { user } } = await supabaseClient.auth.getUser()
      if (user && filteredData.length > 0) {
        const questaoIds = filteredData.map(q => q.id)
        const { data: respostasUser } = await supabaseClient
          .from('respostas')
          .select('questao_id')
          .eq('user_id', user.id)
          .in('questao_id', questaoIds)

        const resolvedIds = new Set((respostasUser || []).map(r => r.questao_id))

        if (activeResolucaoFilter === 'jaResolvi') {
          filteredData = filteredData.filter(q => resolvedIds.has(q.id))
        } else {
          filteredData = filteredData.filter(q => !resolvedIds.has(q.id))
        }
      } else if (activeResolucaoFilter === 'jaResolvi') {
        filteredData = [] // No user = no resolved questions
      }
    }

    questoesCache = filteredData
    questaoCount.textContent = questoesCache.length
    renderResults()
  } catch (e) {
    questaoCount.textContent = '0'
    resultsList.innerHTML = ''
    msg.style.display = 'block'
    msg.className = 'msg msg-error'
    msg.textContent = 'Erro de conexão ao buscar questões'
    console.error('buscarQuestoes error:', e)
  }
}

function renderResults() {
  resultsList.innerHTML = ''

  if (questoesCache.length === 0) {
    resultsList.innerHTML = `
      <div class="no-results">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
        <h3>Nenhuma questão encontrada</h3>
        <p>Tente alterar os filtros para encontrar questões disponíveis</p>
      </div>`
    return
  }

  questoesCache.forEach((q, i) => {
    const card = document.createElement('div')
    card.className = 'result-card'
    card.innerHTML = `
      <div class="result-card-header">
        <span class="result-card-num">Q${i + 1}</span>
        <span class="result-card-meta">${q.materia} • ${q.area} • ${q.assunto}</span>
      </div>
      <div class="result-card-text">${q.enunciado}</div>
      <div class="result-card-footer">
        <span class="result-tag">${q.materia}</span>
        <span class="result-tag">${q.area}</span>
      </div>
    `
    card.addEventListener('click', () => {
      // Navigate to questoes.html with URL params (FIX: pass filters via URL)
      const url = new URL('questoes.html', window.location.origin)
      if (selectedMateria) url.searchParams.set('materia', selectedMateria)
      if (areaSelect.value) url.searchParams.set('area', areaSelect.value)
      if (assuntoSelect.value) url.searchParams.set('assunto', assuntoSelect.value)
      // Start at this specific question
      url.searchParams.set('start', i)
      window.location.href = url.toString()
    })
    resultsList.appendChild(card)
  })
}

// Filter tags - mutually exclusive for resolution status
let activeResolucaoFilter = 'resolucao' // default
document.querySelectorAll('.filter-tag').forEach(tag => {
  tag.addEventListener('click', () => {
    // Remove active from all filter tags
    document.querySelectorAll('.filter-tag').forEach(t => t.classList.remove('active'))
    // Activate only the clicked one
    tag.classList.add('active')
    activeResolucaoFilter = tag.dataset.filter
    buscarQuestoes()
  })
})

// Action buttons — FIX: Pass filters via URL params instead of localStorage
document.getElementById('btnVerQuestoes').addEventListener('click', () => {
  const url = new URL('questoes.html', window.location.origin)
  if (selectedMateria) url.searchParams.set('materia', selectedMateria)
  if (areaSelect.value) url.searchParams.set('area', areaSelect.value)
  if (assuntoSelect.value) url.searchParams.set('assunto', assuntoSelect.value)
  window.location.href = url.toString()
})

document.getElementById('btnCriarLista').addEventListener('click', () => {
  alert('Funcionalidade em desenvolvimento')
})

document.getElementById('btnCriarSimulado').addEventListener('click', () => {
  alert('Funcionalidade em desenvolvimento')
})

// Init already called after auth check above
</script>
</body>
</html>
