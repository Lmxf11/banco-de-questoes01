<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Meu Perfil — Mesa de Estudos</title>
  <link rel="icon" type="image/jpeg" href="imagem.jpeg">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="materias.js"></script>
<style>
body { background: var(--bg-dark); color: var(--text-primary); }

.perfil-page {
  max-width: 560px;
  margin: 60px auto;
  padding: 0 20px;
}

.perfil-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-xl);
  padding: 36px 32px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
}

.perfil-header {
  display: flex;
  align-items: center;
  gap: 18px;
  margin-bottom: 28px;
  padding-bottom: 20px;
  border-bottom: 1px solid var(--border);
}

.perfil-avatar {
  width: 64px;
  height: 64px;
  border-radius: 50%;
  background: rgba(37,99,235,0.2);
  border: 2px solid var(--blue-primary);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  font-weight: 800;
  color: var(--blue-pale);
  flex-shrink: 0;
}

.perfil-header-text h1 {
  font-size: 20px;
  font-weight: 800;
  color: #fff;
  margin-bottom: 2px;
}

.perfil-header-text p {
  font-size: 13px;
  color: var(--text-muted);
}

.perfil-field {
  margin-bottom: 20px;
}

.perfil-field label {
  display: block;
  font-size: 11px;
  font-weight: 700;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 6px;
}

.perfil-field input {
  width: 100%;
  padding: 11px 16px;
  border-radius: 10px;
  border: 1.5px solid var(--border);
  background: rgba(255,255,255,0.06);
  color: var(--text-primary);
  font-size: 14px;
  font-family: 'Inter', sans-serif;
  outline: none;
  transition: all 0.2s;
}

.perfil-field input:focus {
  border-color: var(--blue-primary);
  box-shadow: 0 0 0 3px rgba(37,99,235,0.15);
  background: rgba(255,255,255,0.1);
}

.perfil-field input:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.perfil-info {
  padding: 11px 16px;
  border-radius: 10px;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  font-size: 14px;
  color: var(--text-secondary);
}

.btn-row {
  display: flex;
  gap: 10px;
  margin-top: 24px;
}

.btn-save {
  flex: 1;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(135deg, #2563eb, #1d4ed8);
  color: #fff;
  font-weight: 700;
  font-size: 14px;
  cursor: pointer;
  transition: all 0.2s;
  font-family: 'Inter', sans-serif;
}

.btn-save:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(37,99,235,0.4);
}

.btn-save:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none;
  box-shadow: none;
}

.btn-cancel {
  padding: 12px 20px;
  border-radius: 10px;
  border: 1.5px solid var(--border);
  background: transparent;
  color: var(--text-secondary);
  font-weight: 600;
  font-size: 14px;
  cursor: pointer;
  transition: all 0.2s;
  font-family: 'Inter', sans-serif;
}

.btn-cancel:hover {
  border-color: var(--blue-primary);
  color: var(--blue-pale);
}

.btn-back {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-muted);
  text-decoration: none;
  margin-bottom: 24px;
  transition: color 0.15s;
}

.btn-back:hover { color: var(--blue-pale); }
.btn-back svg { width: 16px; height: 16px; }

#msg {
  margin-top: 14px;
  font-weight: 600;
  font-size: 13px;
  text-align: center;
  min-height: 18px;
}

@media (max-width: 600px) {
  .perfil-page { margin: 30px auto; }
  .perfil-card { padding: 24px 20px; }
}
</style>
<script src="https://sites.super.myninja.ai/_assets/ninja-daytona-script.js"></script>
</head>
<body>

<div class="perfil-page">
  <a href="dashboard.html" class="btn-back">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    Voltar ao dashboard
  </a>

  <div class="perfil-card">
    <div class="perfil-header">
      <div class="perfil-avatar" id="avatarLetter">?</div>
      <div class="perfil-header-text">
        <h1 id="headerName">Meu Perfil</h1>
        <p id="headerEmail">carregando...</p>
      </div>
    </div>

    <div class="perfil-field">
      <label>Nome de exibicao</label>
      <input type="text" id="inputNome" placeholder="Seu nome de exibicao">
    </div>

    <div class="perfil-field">
      <label>Email</label>
      <div class="perfil-info" id="emailDisplay">—</div>
    </div>

    <div class="perfil-field">
      <label>Data de cadastro</label>
      <div class="perfil-info" id="createdDisplay">—</div>
    </div>

    <div class="btn-row">
      <button class="btn-save" id="btnSalvar" disabled>Salvar alteracoes</button>
      <button class="btn-cancel" id="btnCancelar" style="display:none">Cancelar</button>
    </div>

    <p id="msg"></p>
  </div>
</div>

<img src="imagem.jpeg" class="floating-logo" alt="Logo">

<script>
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

const inputNome = document.getElementById('inputNome')
const emailDisplay = document.getElementById('emailDisplay')
const createdDisplay = document.getElementById('createdDisplay')
const avatarLetter = document.getElementById('avatarLetter')
const headerName = document.getElementById('headerName')
const headerEmail = document.getElementById('headerEmail')
const btnSalvar = document.getElementById('btnSalvar')
const btnCancelar = document.getElementById('btnCancelar')
const msgEl = document.getElementById('msg')

let originalName = ''

;(async () => {
  const { data: { user } } = await supabaseClient.auth.getUser()
  if (!user) { window.location.href = 'login.html'; return }

  const email = user.email || '—'
  emailDisplay.textContent = email
  headerEmail.textContent = email

  const created = user.created_at ? new Date(user.created_at).toLocaleDateString('pt-BR') : '—'
  createdDisplay.textContent = created

  const { data: userData } = await supabaseClient.from('users').select('display_name').eq('id', user.id).single()
  const name = userData?.display_name || ''
  originalName = name
  inputNome.value = name

  const letter = name ? name.charAt(0).toUpperCase() : email.charAt(0).toUpperCase()
  avatarLetter.textContent = letter
  headerName.textContent = name || 'Meu Perfil'

  btnSalvar.disabled = true
})()

inputNome.addEventListener('input', () => {
  const changed = inputNome.value.trim() !== originalName
  btnSalvar.disabled = !changed
  btnCancelar.style.display = changed ? 'block' : 'none'
})

btnCancelar.addEventListener('click', () => {
  inputNome.value = originalName
  btnSalvar.disabled = true
  btnCancelar.style.display = 'none'
  msgEl.textContent = ''
})

btnSalvar.addEventListener('click', async () => {
  const nome = inputNome.value.trim()
  if (!nome) { msgEl.style.color = '#ef4444'; msgEl.textContent = 'O nome nao pode ficar vazio.'; return }

  btnSalvar.disabled = true
  msgEl.style.color = '#f59e0b'
  msgEl.textContent = 'Salvando...'

  const { data: { user } } = await supabaseClient.auth.getUser()
  if (!user) { window.location.href = 'login.html'; return }

  const { error } = await supabaseClient.from('users').update({ display_name: nome }).eq('id', user.id)
  if (error) {
    msgEl.style.color = '#ef4444'
    msgEl.textContent = 'Erro ao salvar: ' + error.message
    btnSalvar.disabled = false
    return
  }

  originalName = nome
  avatarLetter.textContent = nome.charAt(0).toUpperCase()
  headerName.textContent = nome
  btnCancelar.style.display = 'none'
  msgEl.style.color = '#10b981'
  msgEl.textContent = 'Nome atualizado com sucesso!'
  setTimeout(() => { msgEl.textContent = '' }, 3000)
})
</script>
</body>
</html>
