<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Completar Perfil — Mesa de Estudos</title>
  <link rel="icon" type="image/jpeg" href="imagem.jpeg">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="materias.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
body {
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  background: linear-gradient(135deg, #0a1628 0%, #0f1f3d 40%, #1a3a6b 100%);
}
.cp-card {
  width: 420px; max-width: 90vw; background: #fff; border-radius: 24px;
  padding: 40px 36px; box-shadow: 0 30px 80px rgba(0,0,0,0.4);
}
.cp-card h2 { font-size: 22px; font-weight: 800; color: #0a1628; margin-bottom: 6px; }
.cp-card .subtitle { font-size: 14px; color: #64748b; margin-bottom: 28px; }
.cp-field { margin-bottom: 18px; }
.cp-field label { display: block; font-size: 13px; font-weight: 600; color: #334155; margin-bottom: 6px; }
.cp-field label span { color: #2563eb; }
.cp-field input {
  width: 100%; padding: 12px 16px; border-radius: 10px; border: 1.5px solid #e2e8f0;
  background: #f8fafc; color: #0f172a; font-size: 14px; outline: none; transition: all 0.2s;
}
.cp-field input:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,0.15); background: #fff; }
.cp-field input::placeholder { color: #94a3b8; }
.cp-btn {
  width: 100%; padding: 13px; border-radius: 12px; border: none;
  background: linear-gradient(135deg, #2563eb, #1d4ed8); color: #fff;
  font-weight: 700; font-size: 15px; cursor: pointer; transition: all 0.2s; margin-top: 6px;
}
.cp-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 28px rgba(37,99,235,0.4); }
#msg { margin-top: 12px; font-weight: 600; font-size: 13px; text-align: center; }
</style>
<script src="https://sites.super.myninja.ai/_assets/ninja-daytona-script.js"></script>
</head>
<body>
<div class="cp-card">
  <h2>Completar Perfil</h2>
  <p class="subtitle">Parece que voce fez login com o Google. Como queremos te chamar?</p>
  <form id="completeForm">
    <div class="cp-field">
      <label>Nome de exibicao <span>*</span></label>
      <input type="text" id="inputNome" placeholder="Seu nome" required>
    </div>
    <button type="submit" class="cp-btn">Salvar e continuar</button>
  </form>
  <p id="msg"></p>
</div>

<script>
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

;(async () => {
  const { data: { user } } = await supabaseClient.auth.getUser()
  if (!user) { window.location.href = 'login.html'; return }

  // If user already has display_name, skip this page
  const { data: userData } = await supabaseClient.from('users').select('display_name').eq('id', user.id).single()
  if (userData && userData.display_name) {
    window.location.href = 'dashboard.html'
    return
  }

  // Pre-fill with Google name if available
  const googleName = user.user_metadata?.full_name || user.user_metadata?.nome || ''
  if (googleName) document.getElementById('inputNome').value = googleName
})()

document.getElementById('completeForm').addEventListener('submit', async (e) => {
  e.preventDefault()
  const msg = document.getElementById('msg')
  const nome = document.getElementById('inputNome').value.trim()
  if (!nome) { msg.style.color = '#ef4444'; msg.textContent = 'Digite seu nome'; return }

  msg.style.color = '#f59e0b'
  msg.textContent = 'Salvando...'

  const { data: { user } } = await supabaseClient.auth.getUser()
  if (!user) { window.location.href = 'login.html'; return }

  const { error } = await supabaseClient.from('users').update({ display_name: nome }).eq('id', user.id)
  if (error) { msg.style.color = '#ef4444'; msg.textContent = 'Erro ao salvar: ' + error.message; return }

  msg.style.color = '#10b981'
  msg.textContent = 'Salvo! Redirecionando...'
  setTimeout(() => { window.location.href = 'dashboard.html' }, 1000)
})
</script>
</body>
</html>
